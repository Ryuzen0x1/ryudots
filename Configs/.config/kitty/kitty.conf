# Font
font_family                   Maple Mono NF
bold_font                     auto
italic_font                   auto
bold_italic_font              auto
font_size                     10

# Cursor
cursor_trail                  3
shell_integration             no-cursor
cursor_shape                  block
# cursor_beam_thickness         2.0   # Sets the thickness of the beam-shaped cursor.
# cursor_underline_thickness    2.0   # Sets the thickness of the underline-shaped cursor.
# cursor_blink_interval         0     # Disables cursor blinking by setting the interval to 0.

window_padding_width          20
background_opacity            0.85
enable_audio_bell             no

# BEGIN KITTY THEME
include current-theme.conf
# END KITTY THEME

# Copy
map ctrl+c    copy_or_interrupt

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
